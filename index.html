<!DOCTYPE html>
<html>

<body class="homepage">

    </header>

    <main>
        <section class="artists">
            <div class="names">
                <a href="pharaoh.html" class="avatar">
                    <div class="ava-inner">
                        <img src="pharaoh.jpg" alt="Фараон">
                    </div>
                    <div class="artist-name">
                        <span class="hisname">PHARAOH</span>
                    </div>
                </a>
            </div>
            <div class="names">
                <a href="linnik.html" class="avatar">
                    <div class="ava-inner">
                        <img src="linnik.jpg" alt="Линник">
                    </div>
                    <div class="artist-name">
                        <span class="hisname">Линник</span>
                    </div>
                </a>
            </div>
            <div class="names">
                <a href="lilos_wag.html" class="avatar">
                    <div class="ava-inner">
                        <img src="liloswag.jpg" alt="ЛилосВаг">
                    </div>
                    <div class="artist-name">
                        <span class="hisname">Lilos_WAG.business</span>

        <section class="intro">
            <h2>Сайт создан в учебных и демонстративных целях</h2>
        </section>

    <footer>
        <p>© alyametery UCL 2026</p>
    </footer>
    <div class="ballz">
        <svg width="400" height="400" viewBox="0 0 200 200">
            <defs>
                <path id="circlePath" d="M 100, 100 m -75, 0 a 80,80 0 1,1 160,0 a 80,80 0 1,1 -160,0"/>
            </defs>
            <text font-size="33" fill="#ccc">
                <textPath href="#circlePath" startOffset="50%" text-anchor="middle">
                    alyametery UCL - alyametery UCL -
                </textPath>
            </text>
        </svg>
    </div>
    <div class="global-player">
    <div class="player-controls">
        <button id="prev">◁</button>
        <button id="next">▷</button>
    </div>
    <div class="player-info">
        <span class="player-label">Сейчас играет:</span>
        <span id="now-playing">Ничего</span>
    </div>
    <audio id="main-audio" controls></audio>
</div>
<script src="player.js"></script>

</html>
